services:
  logserver:
    image:  ghcr.io/hamstring-ndr/hamstring-logserver:v2.0.0
    restart: "unless-stopped"
    networks:
      hamstring:
    volumes:
      - "${MOUNT_PATH:?MOUNT_PATH not set}:/opt/file.txt"
      - ../../../config.yaml:/app/config.yaml
    environment:
      - GROUP_ID=log_storage
  logcollector:
    image:  ghcr.io/hamstring-ndr/hamstring-logcollector:v2.0.0
    restart: "unless-stopped"
    volumes:
      - ../../../config.yaml:/app/config.yaml
    networks:
      hamstring:
    environment:
      - GROUP_ID=log_collection

  prefilter:
    image: ghcr.io/hamstring-ndr/hamstring-prefilter:v2.0.0
    restart: "unless-stopped"
    volumes:
      - ../../../config.yaml:/app/config.yaml
    networks:
      hamstring:
    deploy:
      mode: "replicated"
      replicas: 1
    environment:
      - GROUP_ID=log_filtering

  inspector:
    image:  ghcr.io/hamstring-ndr/hamstring-inspector:v2.0.0
    restart: "unless-stopped"
    volumes:
      - ../../../config.yaml:/app/config.yaml
    networks:
      hamstring:
    deploy:
      mode: "replicated"
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 512m
        reservations:
          cpus: '1'
          memory: 256m
    environment:
      - GROUP_ID=data_inspection
      - NUMBER_OF_INSTANCES=1

  detector:
    image:  ghcr.io/hamstring-ndr/hamstring-detector:v2.0.0
    restart: "unless-stopped"
    volumes:
      - ../../../config.yaml:/app/config.yaml
    networks:
      hamstring:
    deploy:
      mode: "replicated"
      replicas: 1
    environment:
      - GROUP_ID=data_analysis

  alerter:
    image:  ghcr.io/hamstring-ndr/hamstring-alerter:v2.0.0
    restart: "unless-stopped"
    volumes:
      - ../../../config.yaml:/app/config.yaml
      - /opt/logs:/opt/logs
    networks:
      hamstring:
    deploy:
      mode: "replicated"
      replicas: 1
    environment:
      - GROUP_ID=data_alerting
