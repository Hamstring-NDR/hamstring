services:
  monitoring_agent:
    image: ghcr.io/hamstring-ndr/hamstring-monitoring:v1.0.0
    restart: "unless-stopped"
    volumes:
      - ../../../config.yaml:/app/config.yaml
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
      clickhouse-server:
        condition: service_healthy
      grafana:
        condition: service_healthy
    networks:
      - hamstring
    environment:
      - GROUP_ID=monitoring_agent
